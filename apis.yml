aid: multus-cni
name: Multus CNI
description: >-
  Multus CNI is a container network interface plugin for Kubernetes that enables
  attaching multiple network interfaces to pods. It acts as a meta-plugin that
  can call multiple other CNI plugins, allowing pods to have connectivity to
  multiple networks simultaneously.
